<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auvian — Precision en cada detalle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --white: #f7f7f5;
    --off-white: #eceae6;
    --light-gray: #d4d0ca;
    --mid-gray: #9b9690;
    --dark-gray: #3a3835;
    --near-black: #1a1917;
    --accent: #6b6560;
  }

  html, body {
    height: 100%;
    background: var(--white);
    color: var(--near-black);
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    overflow: hidden;
  }

  /* ─── GRAIN OVERLAY ─── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 100;
  }

  /* ─── LAYOUT ─── */
  .page {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 100vh;
    height: 100vh;
  }

  /* ─── LEFT PANEL ─── */
  .left {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 52px 56px;
    position: relative;
    background: var(--white);
    opacity: 0;
    animation: fadeUp 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.15rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--near-black);
  }

  .logo span {
    display: inline-block;
    width: 6px;
    height: 6px;
    background: var(--near-black);
    border-radius: 50%;
    margin-left: 4px;
    vertical-align: middle;
    position: relative;
    top: -2px;
  }

  .main-content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding-bottom: 32px;
  }

  .eyebrow {
    font-size: 0.62rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--mid-gray);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.45s forwards;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(3.2rem, 5vw, 5.2rem);
    line-height: 1.08;
    letter-spacing: -0.01em;
    color: var(--near-black);
    margin-bottom: 30px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.6s forwards;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .tagline {
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid-gray);
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.75s forwards;
  }

  .cta-row {
    display: flex;
    align-items: center;
    gap: 36px;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 0.9s forwards;
  }

  .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--near-black);
    color: var(--white);
    text-decoration: none;
    font-size: 0.7rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 16px 30px;
    transition: background 0.3s, color 0.3s;
  }

  .cta-btn:hover {
    background: var(--accent);
  }

  .cta-link {
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mid-gray);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    padding-bottom: 2px;
    transition: color 0.3s, border-color 0.3s;
  }

  .cta-link:hover {
    color: var(--near-black);
    border-color: var(--near-black);
  }

  .bottom-left {
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 1.1s forwards;
  }

  .services-list {
    display: flex;
    gap: 32px;
    list-style: none;
  }

  .services-list li {
    font-size: 0.62rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--light-gray);
  }

  /* ─── RIGHT PANEL ─── */
  .right {
    position: relative;
    background: var(--dark-gray);
    overflow: hidden;
    opacity: 0;
    animation: fadeIn 1.4s ease 0.2s forwards;
  }

  .right-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 70% 30%, rgba(255,255,255,0.04) 0%, transparent 60%),
      radial-gradient(ellipse at 20% 80%, rgba(255,255,255,0.03) 0%, transparent 50%);
  }

  /* Geometric decorative lines */
  .geo-lines {
    position: absolute;
    inset: 0;
  }

  .geo-lines svg {
    width: 100%;
    height: 100%;
  }

  /* Device icon */
  .device-wrap {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .device-icon {
    opacity: 0;
    animation: scaleIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.7s forwards;
  }

  /* Corner label */
  .corner-label {
    position: absolute;
    bottom: 52px;
    right: 48px;
    text-align: right;
    opacity: 0;
    animation: fadeUp 1s cubic-bezier(0.22, 1, 0.36, 1) 1.2s forwards;
  }

  .corner-label p {
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    line-height: 2;
  }

  .divider-line {
    position: absolute;
    top: 0;
    bottom: 0;
    left: 50%;
    width: 1px;
    background: linear-gradient(to bottom, transparent 5%, var(--light-gray) 30%, var(--light-gray) 70%, transparent 95%);
    opacity: 0.3;
  }

  /* ─── ANIMATIONS ─── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(22px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(0.88); }
    to { opacity: 1; transform: scale(1); }
  }

  @keyframes drawLine {
    from { stroke-dashoffset: 1000; }
    to { stroke-dashoffset: 0; }
  }

  /* ─── MODAL ─── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,25,23,0.55);
    backdrop-filter: blur(6px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.35s ease;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--white);
    width: 360px;
    padding: 44px 40px 36px;
    position: relative;
    transform: translateY(18px) scale(0.97);
    transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
  }

  .modal-close {
    position: absolute;
    top: 18px;
    right: 20px;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--light-gray);
    font-size: 1.1rem;
    line-height: 1;
    transition: color 0.2s;
    padding: 4px;
  }

  .modal-close:hover { color: var(--near-black); }

  .modal-eyebrow {
    font-size: 0.58rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--mid-gray);
    margin-bottom: 10px;
  }

  .modal-title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 1.9rem;
    color: var(--near-black);
    margin-bottom: 32px;
    line-height: 1.1;
  }

  .modal-options {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .modal-option {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
    text-decoration: none;
    border: 1px solid var(--off-white);
    color: var(--near-black);
    transition: border-color 0.25s, background 0.25s;
  }

  .modal-option:hover {
    border-color: var(--accent);
    background: var(--off-white);
  }

  .modal-option-icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-option-text {}
  .modal-option-label {
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--near-black);
    display: block;
    margin-bottom: 2px;
  }
  .modal-option-sub {
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    color: var(--mid-gray);
  }

  .animated-path {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: drawLine 2.5s ease 0.8s forwards;
  }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 768px) {
    html, body { overflow: auto; }
    .page {
      grid-template-columns: 1fr;
      grid-template-rows: auto;
      height: auto;
    }
    .left { padding: 40px 32px; min-height: 100vh; }
    .right { height: 50vh; }
    .divider-line { display: none; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- LEFT -->
  <div class="left">
    <div class="logo">Auvian<span></span></div>

    <div class="main-content">
      <p class="eyebrow">Repair · Restore · Renew</p>
      <h1>Restauramos tecnología<br> recuperamos <em>confianza.</em></h1>
      <p class="tagline">Precision in every detail.</p>
      <div class="cta-row">
        <a href="#" class="cta-btn" id="openModal">Contactar</a>
      </div>
    </div>

    <div class="bottom-left">
      <ul class="services-list">
        <li>Celulares</li>
        <li>Computadoras</li>
      </ul>
    </div>
  </div>

  <div class="divider-line"></div>

  <!-- RIGHT -->
  <div class="right">
    <div class="right-bg"></div>

    <div class="geo-lines">
      <svg viewBox="0 0 600 800" fill="none" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <!-- Abstract circuit / precision lines -->
        <path class="animated-path" d="M100 200 L180 200 L180 140 L380 140 L380 200 L500 200" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
        <path class="animated-path" d="M60 350 L200 350 L200 420 L420 420 L420 350 L560 350" stroke="rgba(255,255,255,0.07)" stroke-width="1" style="animation-delay:1.1s"/>
        <path class="animated-path" d="M300 80 L300 720" stroke="rgba(255,255,255,0.04)" stroke-width="1" style="animation-delay:1.3s"/>
        <path class="animated-path" d="M150 500 L150 600 L450 600 L450 500" stroke="rgba(255,255,255,0.06)" stroke-width="1" style="animation-delay:1.5s"/>
        <!-- corner accents -->
        <rect x="40" y="40" width="60" height="60" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none" class="animated-path" style="animation-delay:1.8s"/>
        <rect x="500" y="700" width="60" height="60" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none" class="animated-path" style="animation-delay:2s"/>
        <!-- small dots -->
        <circle cx="180" cy="200" r="3" fill="rgba(255,255,255,0.2)" opacity="0" style="animation: fadeIn 0.3s ease 1.5s forwards;"/>
        <circle cx="380" cy="140" r="3" fill="rgba(255,255,255,0.2)" opacity="0" style="animation: fadeIn 0.3s ease 1.7s forwards;"/>
        <circle cx="200" cy="420" r="3" fill="rgba(255,255,255,0.15)" opacity="0" style="animation: fadeIn 0.3s ease 1.9s forwards;"/>
        <circle cx="420" cy="350" r="3" fill="rgba(255,255,255,0.15)" opacity="0" style="animation: fadeIn 0.3s ease 2.1s forwards;"/>
      </svg>
    </div>

    <div class="device-wrap">
      <div class="device-icon">
        <svg width="180" height="220" viewBox="0 0 180 220" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- Phone outline -->
          <rect x="45" y="10" width="90" height="160" rx="14" stroke="rgba(255,255,255,0.18)" stroke-width="1.5" fill="none"/>
          <rect x="55" y="22" width="70" height="116" rx="4" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="rgba(255,255,255,0.03)"/>
          <!-- Home bar -->
          <rect x="72" y="152" width="36" height="4" rx="2" fill="rgba(255,255,255,0.15)"/>
          <!-- Screen content lines -->
          <line x1="65" y1="50" x2="115" y2="50" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
          <line x1="65" y1="62" x2="95" y2="62" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
          <rect x="65" y="78" width="50" height="36" rx="3" stroke="rgba(255,255,255,0.08)" stroke-width="1" fill="none"/>
          <!-- Wrench icon inside screen -->
          <path d="M82 88 C80 86 80 82 82 80 L85 83 L88 80 L90 82 L87 85 L90 88 L88 90 L84 90 Z" stroke="rgba(255,255,255,0.25)" stroke-width="1" fill="none"/>
          <line x1="89" y1="88" x2="96" y2="95" stroke="rgba(255,255,255,0.25)" stroke-width="1.5" stroke-linecap="round"/>
          <!-- bottom lines -->
          <line x1="65" y1="124" x2="115" y2="124" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
          <line x1="65" y1="132" x2="100" y2="132" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>

          <!-- Laptop behind / below -->
          <rect x="5" y="175" width="170" height="105" rx="6" stroke="rgba(255,255,255,0.1)" stroke-width="1" fill="none"/>
          <rect x="15" y="182" width="150" height="78" rx="3" stroke="rgba(255,255,255,0.07)" stroke-width="1" fill="rgba(255,255,255,0.02)"/>
          <!-- keyboard rows -->
          <line x1="15" y1="200" x2="165" y2="200" stroke="rgba(255,255,255,0.05)" stroke-width="1"/>
          <line x1="15" y1="210" x2="165" y2="210" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
          <!-- trackpad -->
          <rect x="70" y="215" width="40" height="26" rx="3" stroke="rgba(255,255,255,0.07)" stroke-width="1" fill="none"/>
        </svg>
      </div>
    </div>

    <div class="corner-label">
      <p>Servicio profesional</p>
      <p>Diagnóstico gratuito</p>
    </div>
  </div>


</div>

<!-- CONTACT MODAL -->
<div class="modal-overlay" id="contactModal">
  <div class="modal">
    <button class="modal-close" id="modalClose" aria-label="Cerrar">&#10005;</button>
    <p class="modal-eyebrow">Contáctanos</p>
    <h2 class="modal-title">¿Cómo quieres<br>comunicarte?</h2>
    <div class="modal-options">

      <a class="modal-option" href="https://www.instagram.com/auv1an/" target="_blank" rel="noopener">
        <div class="modal-option-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="2" y="2" width="20" height="20" rx="6" stroke="#3a3835" stroke-width="1.5"/>
            <circle cx="12" cy="12" r="4" stroke="#3a3835" stroke-width="1.5"/>
            <circle cx="17.5" cy="6.5" r="1" fill="#3a3835"/>
          </svg>
        </div>
        <div class="modal-option-text">
          <span class="modal-option-label">Instagram</span>
          <span class="modal-option-sub">@auv1an</span>
        </div>
      </a>

      <a class="modal-option" href="https://wa.me/529934059269" target="_blank" rel="noopener">
        <div class="modal-option-icon">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2 22l4.978-1.41A9.957 9.957 0 0012 22c5.523 0 10-4.477 10-10S17.523 2 12 2z" stroke="#3a3835" stroke-width="1.5" fill="none"/>
            <path d="M8.5 9.5c.5 1 1.5 3 3.5 4s3-1 3-1-.5-1.5-1-1.5-1.5.5-1.5.5S11 10.5 10 9.5 9 8 9 8 8 8.5 8.5 9.5z" stroke="#3a3835" stroke-width="1.2" fill="none" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="modal-option-text">
          <span class="modal-option-label">WhatsApp</span>
          <span class="modal-option-sub">+52 993 405 9269</span>
        </div>
      </a>

    </div>
  </div>
</div>

<script>
  const modal = document.getElementById('contactModal');
  const openBtn = document.getElementById('openModal');
  const closeBtn = document.getElementById('modalClose');

  openBtn.addEventListener('click', (e) => {
    e.preventDefault();
    modal.classList.add('open');
  });

  closeBtn.addEventListener('click', () => modal.classList.remove('open'));
  modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('open'); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') modal.classList.remove('open'); });
</script>
</body>
</html>
